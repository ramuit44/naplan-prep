<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Adhrit Naplan App{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <a href="{{ url_for('index') }}" class="logo">
      <span class="logo-icon">📚</span>
      <span class="logo-text">Adhrit Naplan App</span>
    </a>
    <nav class="main-nav">
      <a href="{{ url_for('index') }}">Home</a>
      <a href="{{ url_for('writing') }}">Writing</a>
      <a href="{{ url_for('reading') }}">Reading</a>
      <a href="{{ url_for('language_conventions') }}">Language Conventions</a>
      <a href="{{ url_for('numeracy') }}">Numeracy</a>
    </nav>
  </header>
  <main class="main-content {% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <p>Practice NAPLAN year by year. Have fun learning!</p>
  </footer>
</body>
</html>
